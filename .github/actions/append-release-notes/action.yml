name: Append Release Notes
description: Appends a section to the pre-release GitHub Release notes

inputs:
  body:
    description: "Content to append to the pre-release notes"
    required: true
  github_token:
    description: "GitHub token with contents:write permission"
    required: true

runs:
  using: composite
  steps:
    - name: Append notes to pre-release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        BODY: ${{ inputs.body }}
      run: |
        CURRENT=$(gh release view pre-release --json body -q .body)
        NOTES_FILE=$(mktemp)
        printf '%s\n\n%s\n' "$CURRENT" "$BODY" > "$NOTES_FILE"
        gh release edit pre-release --notes-file "$NOTES_FILE"
        rm -f "$NOTES_FILE"
